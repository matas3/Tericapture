<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tericapture - Optimized</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    overflow: hidden;
}

#map {
    width: 100vw;
    height: 100vh;
}

.hud {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: white;
    padding: 10px;
    border-radius: 8px;
    font-family: Arial;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="hud" id="hud">Loading...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ======================================
// 🌍 ORIGIN (Marijampolė)
// ======================================

const ORIGIN_LAT = 54.5599;
const ORIGIN_LNG = 23.3541;

// ======================================
// 🗺️ MAP
// ======================================

const map = L.map("map").setView([ORIGIN_LAT, ORIGIN_LNG], 15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap"
}).addTo(map);

// ======================================
// ⚙️ SETTINGS
// ======================================

const TILE_SIZE = 80; // meters per tile

const METERS_PER_LAT = 111320;
const COS_LAT = Math.cos(ORIGIN_LAT * Math.PI / 180);

// ======================================
// 🧠 STORAGE
// ======================================

const capturedTiles = new Set();
const rendered = new Map();

let playerMarker = null;

// ======================================
// 📐 CONVERSION
// ======================================

function metersToLatLng(x, y) {
    const lat = ORIGIN_LAT + (y / METERS_PER_LAT);
    const lng = ORIGIN_LNG + (x / (METERS_PER_LAT * COS_LAT));
    return [lat, lng];
}

function latLngToMeters(lat, lng) {
    return {
        x: (lng - ORIGIN_LNG) * METERS_PER_LAT * COS_LAT,
        y: (lat - ORIGIN_LAT) * METERS_PER_LAT
    };
}

// ======================================
// 🟦 DRAW ONLY CAPTURED TILE
// ======================================

function drawTile(tileX, tileY) {

    const key = tileX + "," + tileY;

    if (rendered.has(key)) return;

    const mx = tileX * TILE_SIZE;
    const my = tileY * TILE_SIZE;
    const half = TILE_SIZE / 2;

    const corners = [
        metersToLatLng(mx - half, my - half),
        metersToLatLng(mx + half, my - half),
        metersToLatLng(mx + half, my + half),
        metersToLatLng(mx - half, my + half)
    ];

    const poly = L.polygon(corners, {
        color: "blue",
        fillColor: "blue",
        fillOpacity: 0.4,
        weight: 0
    }).addTo(map);

    rendered.set(key, poly);
}

// ======================================
// 👤 PLAYER
// ======================================

function updatePlayer(lat, lng) {

    if (!playerMarker) {
        playerMarker = L.marker([lat, lng]).addTo(map);
    } else {
        playerMarker.setLatLng([lat, lng]);
    }

    const pos = latLngToMeters(lat, lng);

    const tileX = Math.floor(pos.x / TILE_SIZE);
    const tileY = Math.floor(pos.y / TILE_SIZE);

    const key = tileX + "," + tileY;

    if (!capturedTiles.has(key)) {

        capturedTiles.add(key);

        drawTile(tileX, tileY);
    }

    document.getElementById("hud").innerHTML =
        `Captured: ${capturedTiles.size}<br>
         Lat: ${lat.toFixed(5)}<br>
         Lng: ${lng.toFixed(5)}`;
}

// ======================================
// 📍 GPS
// ======================================

navigator.geolocation.watchPosition(
    (pos) => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        map.setView([lat, lng], 16);

        updatePlayer(lat, lng);
    },
    (err) => {
        alert("GPS permission required");
    },
    {
        enableHighAccuracy: true
    }
);

</script>

</body>
</html>
